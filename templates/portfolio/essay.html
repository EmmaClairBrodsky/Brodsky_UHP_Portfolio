<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Senior Reflection Essay — Emma Brodsky</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

  <header>
    <span class="header-name">Emma Clair Brodsky</span>
    <nav class="header-nav">
      <a href="/">Home</a>
      <div class="dropdown">
        <a href="#">Portfolio ▾</a>
        <div class="dropdown-menu">
          <a href="/portfolio/professional">Professional</a>
          <a href="/portfolio/academic">Academic</a>
          <a href="/portfolio/personal">Personal</a>
          <a href="/portfolio/essay">Senior Reflection Essay</a>
        </div>
      </div>
    </nav>
  </header>

  <main>
    <div class="coming-soon-wrapper">
      <h1>NC State UHP Portfolio Reflection Essay</h1>
      <iframe
        src="/media/Brodsky_UHP_Portfolio_Reflection_Essay.pdf"
        width="100%"
        height="800px">
      </iframe>
    </div>
  </main>

  <footer>
    <p>Emma Clair Brodsky &copy; <span class="year"></span></p>
  </footer>

  <script>
    document.querySelectorAll('.year').forEach(el => el.textContent = new Date().getFullYear());

    // Dropdown stays open when moving mouse to menu
    document.querySelectorAll('.dropdown').forEach(dropdown => {
      const menu = dropdown.querySelector('.dropdown-menu');
      let closeTimer;
      dropdown.addEventListener('mouseenter', () => { clearTimeout(closeTimer); menu.style.display = 'flex'; });
      dropdown.addEventListener('mouseleave', () => { closeTimer = setTimeout(() => { menu.style.display = ''; }, 150); });
      menu.addEventListener('mouseenter', () => clearTimeout(closeTimer));
      menu.addEventListener('mouseleave', () => { closeTimer = setTimeout(() => { menu.style.display = ''; }, 150); });
    });
  </script>
  <script src="../js/script.js"></script>
</body>
</html>
